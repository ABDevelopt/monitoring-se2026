name: Automatic Deployment to Dewaweb (cPanel)

on:
  push:
    branches:
      - master

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend React SPA
        run: |
          cd frontend
          npm run build

      - name: Upload Frontend to public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: public_html/
          # Hapus file lama di hosting yang sudah tidak ada di local-dir
          dangerous-clean-slate: false

  deploy-backend:
    name: Deploy Express Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Backend Restart Trigger
        run: |
          mkdir -p backend/tmp
          touch backend/tmp/restart.txt

      - name: Upload Backend to monitoring-api
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: monitoring-api/
          exclude: |
            **/node_modules/**
            **/prisma/dev.db
            **/.env
            **/package-lock.json
